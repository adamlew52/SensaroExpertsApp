<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Forestry Library | Sensaro Experts</title>
<style>
:root {
    --forest-black: #070d09;
    --forest-deep: #0a1410;
    --forest-dark: #0f2018;
    --forest-muted: #1d4430;
    --forest-border: rgba(34,197,94,0.2);
    --pine: #22c55e;
    --ember: #f59e0b;
    --sky: #38bdf8;
    --text: #e0f0e5;
    --text-dim: #b0cfbc;
    --text-muted: #6c8b74;
    --radius: 12px;
    --radius-lg: 18px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--forest-black);color:var(--text);line-height:1.6}
.page-wrapper{display:flex;max-width:1400px;margin:0 auto;gap:2rem;padding:1.5rem}
.sidebar{width:240px;flex-shrink:0;position:sticky;top:1rem;background:var(--forest-dark);border-radius:var(--radius);padding:1.25rem;border:1px solid var(--forest-border)}
.sidebar h3{color:var(--pine);margin-bottom:.75rem;padding-bottom:.5rem;border-bottom:1px solid var(--forest-border)}
.sidebar ul{list-style:none}
.sidebar li{margin-bottom:.6rem}
.sidebar a{color:var(--text-dim);text-decoration:none;font-size:.85rem;display:block;padding:.2rem 0}
.sidebar a:hover{color:var(--pine)}
.main-content{flex:1}
.container{background:var(--forest-deep);border-radius:var(--radius-lg);padding:2rem;box-shadow:0 25px 50px -12px rgba(0,0,0,.5)}
.header{text-align:center;padding-bottom:1.5rem;border-bottom:2px solid var(--forest-border);margin-bottom:1rem}
.state-badge{background:var(--pine);color:var(--forest-black);padding:.4rem 1rem;border-radius:40px;font-size:.75rem;font-weight:bold;display:inline-block;margin-bottom:.75rem}
h1{font-size:2rem;background:linear-gradient(135deg,var(--pine),var(--sky));-webkit-background-clip:text;background-clip:text;color:transparent}
.meta{color:var(--text-muted);font-size:.8rem}
.category-section{background:var(--forest-dark);border-radius:var(--radius);padding:.85rem 1rem;margin:1.25rem 0;border-left:4px solid var(--pine);scroll-margin-top:1rem}
.category-section h3{color:var(--pine);margin-bottom:.4rem}
.kw-list{display:flex;flex-wrap:wrap;gap:.4rem;margin:.5rem 0}
.kw{background:rgba(34,197,94,0.1);border:1px solid var(--forest-border);color:var(--text-dim);font-size:.75rem;padding:.2rem .6rem;border-radius:20px}
.excerpt-list{margin:.5rem 0 0 1.25rem;list-style:disc}
.excerpt-list li{margin-bottom:.4rem;font-size:.88rem}
.featured-image{margin:1.25rem 0;text-align:center}
.featured-image img{max-width:100%;border-radius:var(--radius-lg);box-shadow:0 20px 35px -10px rgba(0,0,0,.4)}
.image-gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:.75rem;margin:1.25rem 0}
.image-gallery img{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:var(--radius)}
.content p{margin-bottom:.9rem}
/* --- FIXED TIMELINE (horizontal scroll + tooltips) --- */
.timeline-container {
    margin: 2rem 0;
    background: var(--forest-dark);
    border-radius: var(--radius);
    padding: 1rem 0 1rem 1rem;
}
.timeline-container h2 {
    margin-bottom: 0.75rem;
    font-size: 1.3rem;
    color: var(--pine);
}
.timeline-scroll-wrapper {
    overflow-x: auto;
    padding-bottom: 1rem;
}
.timeline {
    display: flex;
    gap: 2rem;
    min-width: max-content;
    padding: 0.5rem 1rem 1rem 0;
}
.timeline-item {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 80px;
    cursor: pointer;
}
.timeline-year {
    font-weight: bold;
    background: var(--forest-muted);
    padding: 0.3rem 0.8rem;
    border-radius: 40px;
    color: var(--pine);
    border: 1px solid var(--forest-border);
}
.timeline-tooltip {
    visibility: hidden;
    opacity: 0;
    background: var(--forest-black);
    color: var(--text-dim);
    text-align: center;
    padding: 0.5rem 0.75rem;
    border-radius: var(--radius);
    border: 1px solid var(--pine);
    font-size: 0.75rem;
    width: 200px;
    position: absolute;
    bottom: 130%;
    left: 50%;
    transform: translateX(-50%);
    transition: opacity 0.2s ease;
    z-index: 10;
    pointer-events: none;
    white-space: normal;
    word-break: break-word;
}
.timeline-item:hover .timeline-tooltip {
    visibility: visible;
    opacity: 1;
}
.sources{margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--forest-border)}
.sources a{color:var(--sky);font-size:.85rem;display:block;word-break:break-all}
.footer{margin-top:2rem;padding-top:1rem;border-top:1px solid var(--forest-border);text-align:center;font-size:.75rem;color:var(--text-muted)}
.footer a{color:var(--pine)}
@media(max-width:768px){
    .page-wrapper{flex-direction:column}
    .sidebar{width:100%;position:static;margin-bottom:.75rem}
    .sidebar ul{display:flex;flex-wrap:wrap;gap:.5rem}
    .sidebar li{margin:0}
    .sidebar a{padding:.2rem .65rem;background:var(--forest-muted);border-radius:20px}
}

/* extra styles for directory page */
.lib-hero{text-align:center;padding:1.5rem 0 2rem}
.lib-hero h1{margin-bottom:.5rem}
.lib-hero p{color:var(--text-dim);margin-bottom:.75rem}
.stats{background:var(--forest-muted);display:inline-block;padding:.35rem .9rem;border-radius:40px;font-size:.8rem;color:var(--pine)}
#searchInput{width:100%;padding:.75rem 1rem;margin:1rem 0;background:var(--forest-dark);border:1px solid var(--forest-border);border-radius:var(--radius);color:var(--text);font-size:.95rem}
#searchInput::placeholder{color:var(--text-muted)}
.lib-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem;margin-top:1rem}
.lib-card{background:var(--forest-dark);border:1px solid var(--forest-border);border-radius:var(--radius);padding:1rem;display:flex;flex-direction:column;gap:.5rem}
.lib-card h3{font-size:.95rem;color:var(--text);line-height:1.4}
.state-tag{background:rgba(34,197,94,0.15);color:var(--pine);border-radius:20px;padding:.2rem .65rem;font-size:.72rem;font-weight:bold;display:inline-block;width:fit-content}
.keyword-badge{background:rgba(56,189,248,0.1);color:var(--sky);border-radius:12px;padding:.1rem .5rem;font-size:.65rem;display:inline-block;margin-right:.3rem;margin-bottom:.2rem}
.lib-card a{margin-top:auto;color:var(--sky);font-size:.85rem;text-decoration:none}
.lib-card a:hover{text-decoration:underline}
.no-results{text-align:center;color:var(--text-muted);padding:2rem}
</style>
</head>

// DOM elements
const gridContainer = document.getElementById('libGrid');
const searchInput = document.getElementById('searchInput');
const articleCountSpan = document.getElementById('articleCount');

let currentFilterState = 'all';
let currentSort = 'relevance';   // relevance, title, state
let currentSearchTerm = '';

// Helper: compute relevance score for an article given a search term
function computeRelevanceScore(article, term) {
    if (!term) return article.total_mentions || 0;
    const lowerTerm = term.toLowerCase();
    let score = 0;
    // Sum frequencies of keywords that contain the search term (substring match)
    for (const [kw, freq] of Object.entries(article.keyword_freq)) {
        if (kw.includes(lowerTerm)) {
            score += freq;
        }
    }
    // Also give a small bonus if term appears in title or state
    if (article.title.toLowerCase().includes(lowerTerm)) score += 5;
    if (article.state.toLowerCase().includes(lowerTerm)) score += 2;
    return score;
}

// Filter and sort articles
function updateDisplay() {
    let filtered = allArticles.filter(article => {
        if (currentFilterState !== 'all' && article.state !== currentFilterState) return false;
        if (currentSearchTerm) {
            const term = currentSearchTerm.toLowerCase();
            // Show if any keyword matches, title matches, state matches, or topic matches
            const keywordMatch = Object.keys(article.keyword_freq).some(kw => kw.includes(term));
            const titleMatch = article.title.toLowerCase().includes(term);
            const stateMatch = article.state.toLowerCase().includes(term);
            const topicMatch = article.topic.toLowerCase().includes(term);
            return keywordMatch || titleMatch || stateMatch || topicMatch;
        }
        return true;
    });

    // Sorting
    if (currentSort === 'relevance') {
        filtered.sort((a,b) => {
            const scoreA = computeRelevanceScore(a, currentSearchTerm);
            const scoreB = computeRelevanceScore(b, currentSearchTerm);
            return scoreB - scoreA;
        });
    } else if (currentSort === 'title') {
        filtered.sort((a,b) => a.title.localeCompare(b.title));
    } else if (currentSort === 'state') {
        filtered.sort((a,b) => a.state.localeCompare(b.state) || a.title.localeCompare(b.title));
    }

    // Render
    if (filtered.length === 0) {
        gridContainer.innerHTML = '<div class="no-results">No matching articles found.</div>';
        articleCountSpan.innerText = '0 articles';
        return;
    }
    articleCountSpan.innerText = filtered.length + ' article' + (filtered.length !== 1 ? 's' : '');
    let html = '';
    for (const art of filtered) {
        // Show top 3 matching keywords as badges
        let kwBadges = '';
        const keywords = Object.keys(art.keyword_freq).slice(0,5);
        for (const kw of keywords) {
            kwBadges += `<span class="keyword-badge">${kw}</span>`;
        }
        html += `
            <div class="lib-card" data-state="${art.state}" data-topic="${art.topic}">
                <h3>${art.title}</h3>
                <div class="state-tag">${art.state.toUpperCase()}</div>
                <div style="font-size:0.7rem; margin:0.25rem 0">${kwBadges}</div>
                <a href="${art.url}">Read more →</a>
            </div>
        `;
    }
    gridContainer.innerHTML = html;
}

// Event listeners
searchInput.addEventListener('input', (e) => {
    currentSearchTerm = e.target.value;
    updateDisplay();
});

// State filter clicks
document.querySelectorAll('#stateList a').forEach(link => {
    link.addEventListener('click', (e) => {
        e.preventDefault();
        currentFilterState = link.dataset.state;
        // Update active style
        document.querySelectorAll('#stateList a').forEach(a => a.style.color = '');
        link.style.color = 'var(--pine)';
        updateDisplay();
    });
});

// Sort buttons
document.getElementById('sortRelevance').addEventListener('click', (e) => {
    e.preventDefault();
    currentSort = 'relevance';
    updateDisplay();
});
document.getElementById('sortTitle').addEventListener('click', (e) => {
    e.preventDefault();
    currentSort = 'title';
    updateDisplay();
});
document.getElementById('sortState').addEventListener('click', (e) => {
    e.preventDefault();
    currentSort = 'state';
    updateDisplay();
});

// Initial display
updateDisplay();
</script>
